<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0A0E1A" />
<title>Shevlin Operating System</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800;900&family=Barlow:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   SHEVLIN OPERATING SYSTEM  —  design tokens
   ============================================================ */
:root{
  --red:#D41F1F; --red-dk:#B81A1A; --red-soft:rgba(212,31,31,.10);
  --navy:#0A0E1A; --navy-2:#0C1220; --navy-mid:#0D1422; --navy-card:#111827;
  --navy-line:#1E2D42; --navy-line-2:#172033;
  --white:#FFFFFF; --offwhite:#DCE4F0; --grey-lt:#A8B8C8; --grey:#8090A4; --grey-dk:#5C6B82;
  --green:#22B36B; --green-soft:rgba(34,179,107,.12);
  --amber:#E0A52B; --amber-soft:rgba(224,165,43,.12);
  --teal:#2AA6E0;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --disp:'Barlow Condensed',sans-serif;
  --body:'Barlow',sans-serif;
  --r:14px; --r-sm:10px;
  --shadow:0 24px 60px -28px rgba(0,0,0,.8);
  --glass:rgba(17,24,39,.66);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{
  background:var(--navy); color:var(--white);
  font-family:var(--body); font-size:15px; line-height:1.6;
  min-height:100vh; overflow-x:hidden; -webkit-font-smoothing:antialiased;
}
/* atmospheric backdrop */
body::before{
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(820px 620px at 88% -8%, rgba(212,31,31,.10), transparent 60%),
    radial-gradient(700px 600px at -6% 12%, rgba(42,166,224,.06), transparent 55%),
    radial-gradient(900px 700px at 50% 120%, rgba(212,31,31,.05), transparent 60%);
}
body::after{
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.5;
  background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
  background-size:46px 46px;
  -webkit-mask-image:radial-gradient(circle at 50% 0,#000,transparent 78%);
          mask-image:radial-gradient(circle at 50% 0,#000,transparent 78%);
}
.app-root{position:relative; z-index:1;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;}
::selection{background:var(--red);color:#fff;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--navy-line);border-radius:8px;border:2px solid var(--navy);}
::-webkit-scrollbar-thumb:hover{background:#2a3a54;}

/* shared bits */
.mark{flex:none;}
.eyebrow{font-family:var(--disp);font-size:11px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--red);display:inline-flex;align-items:center;gap:10px;}
.eyebrow::before{content:'';width:22px;height:2px;background:var(--red);}
.muted{color:var(--grey);}
.tnum{font-family:var(--mono);font-variant-numeric:tabular-nums;}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--disp);font-weight:700;font-size:13.5px;letter-spacing:.1em;text-transform:uppercase;padding:12px 22px;border-radius:var(--r-sm);transition:.18s;white-space:nowrap;}
.btn-red{background:var(--red);color:#fff;}
.btn-red:hover{background:var(--red-dk);transform:translateY(-1px);}
.btn-ghost{background:rgba(255,255,255,.04);color:var(--offwhite);border:1px solid var(--navy-line);}
.btn-ghost:hover{border-color:#33445f;background:rgba(255,255,255,.07);}
.btn-sm{padding:8px 14px;font-size:12px;letter-spacing:.08em;}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}

/* flags / pills */
.flag{display:inline-flex;align-items:center;gap:7px;font-family:var(--disp);font-weight:700;font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:4px 11px 4px 9px;border-radius:999px;border:1px solid;}
.flag .dot{width:7px;height:7px;border-radius:50%;}
.flag.green{color:#7fe3b0;border-color:rgba(34,179,107,.4);background:var(--green-soft);}
.flag.green .dot{background:var(--green);box-shadow:0 0 8px var(--green);}
.flag.amber{color:#f2cf86;border-color:rgba(224,165,43,.4);background:var(--amber-soft);}
.flag.amber .dot{background:var(--amber);box-shadow:0 0 8px var(--amber);}
.flag.red{color:#f3a3a3;border-color:rgba(212,31,31,.4);background:var(--red-soft);}
.flag.red .dot{background:var(--red);box-shadow:0 0 8px var(--red);}
.flag.lvl{color:var(--grey-lt);border-color:var(--navy-line);background:rgba(255,255,255,.03);}
.flag.lvl .dot{background:var(--teal);}

/* ===================== LOGIN ===================== */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login{width:100%;max-width:420px;}
.login-card{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--navy-line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;}
.login-top{padding:34px 34px 26px;border-bottom:1px solid var(--navy-line-2);position:relative;}
.login-top::after{content:'';position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,var(--red),transparent);}
.login-brand{display:flex;align-items:center;gap:11px;margin-bottom:24px;}
.login-brand .name{font-family:var(--body);font-weight:700;font-size:14px;line-height:1.15;letter-spacing:.02em;}
.login-brand .name span{display:block;font-family:var(--disp);font-weight:700;font-size:10.5px;letter-spacing:.26em;color:var(--grey);}
.login-top h1{font-family:var(--disp);font-weight:900;font-size:34px;line-height:.96;text-transform:uppercase;letter-spacing:-.01em;}
.login-top h1 .red{color:var(--red);}
.login-top p{color:var(--grey-lt);font-size:13.5px;margin-top:10px;}
.login-body{padding:26px 34px 30px;}
.field{margin-bottom:16px;}
.field label{display:block;font-family:var(--disp);font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--grey);margin-bottom:7px;}
.field input,.field select,.field textarea{width:100%;background:rgba(10,14,26,.7);border:1px solid var(--navy-line);border-radius:var(--r-sm);color:#fff;font-size:14.5px;padding:12px 14px;transition:.16s;}
.field textarea{resize:vertical;min-height:78px;line-height:1.55;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px var(--red-soft);}
.field input::placeholder{color:var(--grey-dk);}
.login-err{color:#f3a3a3;font-size:12.5px;min-height:16px;margin:2px 0 12px;font-weight:500;}
.login-foot{margin-top:22px;border-top:1px solid var(--navy-line-2);padding-top:18px;}
.login-foot .lbl{font-family:var(--disp);font-size:10.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--grey-dk);margin-bottom:11px;}
.quick{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.quick button{display:flex;flex-direction:column;align-items:flex-start;gap:1px;text-align:left;padding:9px 11px;border:1px solid var(--navy-line);border-radius:var(--r-sm);background:rgba(255,255,255,.02);transition:.15s;}
.quick button:hover{border-color:var(--red);background:var(--red-soft);}
.quick .qn{font-weight:600;font-size:12.5px;color:#fff;}
.quick .qr{font-family:var(--disp);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);}

/* ===================== SHELL ===================== */
.shell{display:none;min-height:100vh;}
.shell.on{display:grid;grid-template-columns:248px 1fr;}
.side{position:sticky;top:0;align-self:start;height:100vh;display:flex;flex-direction:column;background:linear-gradient(180deg,var(--navy-2),var(--navy));border-right:1px solid var(--navy-line);}
.side-top{padding:20px 18px 16px;border-bottom:1px solid var(--navy-line-2);}
.side-brand{display:flex;align-items:center;gap:10px;}
.side-brand .name{font-family:var(--body);font-weight:700;font-size:13px;line-height:1.1;}
.side-brand .name span{display:block;font-family:var(--disp);font-weight:700;font-size:9.5px;letter-spacing:.24em;color:var(--grey);}
.nav{flex:1;overflow-y:auto;padding:14px 12px;}
.nav-sec{font-family:var(--disp);font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--grey-dk);padding:14px 12px 8px;}
.nav-item{display:flex;align-items:center;gap:12px;width:100%;padding:11px 12px;border-radius:var(--r-sm);color:var(--grey-lt);font-size:14px;font-weight:500;transition:.14s;position:relative;text-align:left;}
.nav-item svg{flex:none;width:18px;height:18px;stroke:currentColor;}
.nav-item:hover{background:rgba(255,255,255,.04);color:#fff;}
.nav-item.active{background:rgba(212,31,31,.12);color:#fff;}
.nav-item.active::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--red);}
.nav-item .badge{margin-left:auto;font-family:var(--mono);font-size:10px;font-weight:700;background:var(--red);color:#fff;border-radius:999px;padding:1px 7px;}
.side-user{padding:14px;border-top:1px solid var(--navy-line-2);display:flex;align-items:center;gap:11px;}
.avatar{width:38px;height:38px;border-radius:10px;flex:none;display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-weight:800;font-size:14px;color:#fff;background:linear-gradient(135deg,var(--teal),var(--red));}
.side-user .who{flex:1;min-width:0;}
.side-user .who b{display:block;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.side-user .who small{font-family:var(--disp);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);}
.icon-btn{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;border:1px solid var(--navy-line);color:var(--grey-lt);transition:.15s;}
.icon-btn:hover{border-color:var(--red);color:#fff;background:var(--red-soft);}
.icon-btn svg{width:16px;height:16px;stroke:currentColor;}

/* main */
.main{min-width:0;display:flex;flex-direction:column;}
.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;padding:16px 28px;background:rgba(10,14,26,.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--navy-line);}
.menu-btn{display:none;}
.topbar h2{font-family:var(--disp);font-weight:800;font-size:24px;text-transform:uppercase;letter-spacing:-.01em;line-height:1;}
.topbar .crumb{font-family:var(--disp);font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--grey);margin-top:3px;}
.topbar .spacer{flex:1;}
.wk{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:12px;color:var(--grey-lt);border:1px solid var(--navy-line);border-radius:999px;padding:7px 14px;}
.wk .d{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);}
.content{padding:28px;max-width:1240px;width:100%;}

/* panels */
.panel{background:var(--navy-card);border:1px solid var(--navy-line);border-radius:var(--r);padding:22px;animation:rise .5s both;}
.panel.top::before,.panel-top{}
.panel.redtop{position:relative;overflow:hidden;}
.panel.redtop::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--red);}
.panel h3,.p-title{font-family:var(--disp);font-weight:800;font-size:17px;text-transform:uppercase;letter-spacing:.02em;}
.p-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.p-head .spacer{flex:1;}
.p-sub{color:var(--grey);font-size:13px;margin-top:-8px;margin-bottom:16px;}
@keyframes rise{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}

.grid{display:grid;gap:18px;}
.g-2{grid-template-columns:repeat(2,1fr);}
.g-3{grid-template-columns:repeat(3,1fr);}
.g-4{grid-template-columns:repeat(4,1fr);}
.g-21{grid-template-columns:1.6fr 1fr;}
.stagger>*{animation:rise .5s both;}
.stagger>*:nth-child(2){animation-delay:.05s;}
.stagger>*:nth-child(3){animation-delay:.1s;}
.stagger>*:nth-child(4){animation-delay:.15s;}
.stagger>*:nth-child(5){animation-delay:.2s;}
.stagger>*:nth-child(6){animation-delay:.25s;}

/* metric cards */
.metric{background:var(--navy-card);border:1px solid var(--navy-line);border-radius:var(--r);padding:18px 18px 16px;position:relative;overflow:hidden;}
.metric .ml{font-family:var(--disp);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--grey);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.metric .mv{font-family:var(--mono);font-weight:700;font-size:34px;line-height:1.05;margin-top:10px;letter-spacing:-.02em;}
.metric .mv small{font-size:15px;color:var(--grey);font-weight:500;}
.metric .mfoot{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:12px;color:var(--grey-lt);}
.metric .trend{font-family:var(--mono);font-weight:600;}
.trend.up{color:#7fe3b0;} .trend.down{color:#f3a3a3;}
.bar{height:6px;border-radius:6px;background:var(--navy-line-2);overflow:hidden;margin-top:12px;}
.bar i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--red),#ff5b5b);}
.bar.g i{background:linear-gradient(90deg,var(--green),#54d99a);}
.bar.a i{background:linear-gradient(90deg,var(--amber),#f2cf86);}

/* sparkline */
.spark{display:flex;align-items:flex-end;gap:4px;height:46px;}
.spark span{flex:1;background:linear-gradient(180deg,#33445f,#1b2740);border-radius:3px 3px 0 0;min-height:3px;transition:.2s;}
.spark span.hi{background:linear-gradient(180deg,#ff5b5b,var(--red));}

/* tables */
.tbl{width:100%;border-collapse:collapse;font-size:13.5px;}
.tbl th{font-family:var(--disp);font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--grey-dk);text-align:left;padding:10px 12px;border-bottom:1px solid var(--navy-line);white-space:nowrap;}
.tbl td{padding:13px 12px;border-bottom:1px solid var(--navy-line-2);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tbody tr{transition:.12s;}
.tbl tbody tr:hover{background:rgba(255,255,255,.02);}
.tbl .num{font-family:var(--mono);font-variant-numeric:tabular-nums;}
.tbl .rt{text-align:right;}
.who-cell{display:flex;align-items:center;gap:11px;}
.who-cell .av{width:34px;height:34px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-weight:800;font-size:12px;background:linear-gradient(135deg,#1f3350,#0f1a2c);border:1px solid var(--navy-line);}
.who-cell b{font-weight:600;font-size:13.5px;}
.who-cell small{display:block;font-family:var(--disp);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--grey);}
.tbl-wrap{overflow-x:auto;margin:0 -22px -22px;padding:0 22px 4px;}

.tabs{display:flex;gap:6px;background:rgba(10,14,26,.6);border:1px solid var(--navy-line);border-radius:999px;padding:4px;}
.tabs button{flex:1;font-family:var(--disp);font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:8px 14px;border-radius:999px;color:var(--grey-lt);transition:.15s;white-space:nowrap;}
.tabs button.on{background:var(--red);color:#fff;}

.kv{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--navy-line-2);font-size:13.5px;}
.kv:last-child{border-bottom:none;}
.kv .k{color:var(--grey-lt);}
.kv .v{font-weight:600;text-align:right;}
.kv .v.tnum{font-family:var(--mono);}

.empty{text-align:center;color:var(--grey);padding:36px 12px;font-size:13.5px;}
.empty svg{width:34px;height:34px;stroke:var(--grey-dk);margin-bottom:10px;}

/* report sections */
.rep-sec{border:1px solid var(--navy-line);border-radius:var(--r-sm);overflow:hidden;margin-bottom:12px;}
.rep-sec .rh{display:flex;align-items:center;gap:10px;padding:12px 15px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--navy-line-2);}
.rep-sec .rh .t{font-family:var(--disp);font-weight:700;font-size:12.5px;letter-spacing:.1em;text-transform:uppercase;}
.rep-sec .rh .auto{margin-left:auto;font-family:var(--disp);font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);border:1px solid rgba(42,166,224,.4);border-radius:999px;padding:2px 9px;}
.rep-sec .rb{padding:14px 15px;font-size:13.5px;color:var(--offwhite);line-height:1.6;}
.rep-sec .rb .pre{white-space:pre-wrap;}

/* score grid */
.score-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--navy-line-2);}
.score-row:last-child{border-bottom:none;}
.score-row .lbl{flex:1;font-size:13.5px;}
.score-row .lbl small{display:block;color:var(--grey);font-size:11.5px;margin-top:2px;}
.seg{display:flex;gap:5px;}
.seg button{width:34px;height:34px;border-radius:8px;border:1px solid var(--navy-line);font-family:var(--mono);font-weight:700;font-size:13px;color:var(--grey-lt);transition:.12s;}
.seg button:hover{border-color:#33445f;}
.seg button.on{background:var(--red);border-color:var(--red);color:#fff;}

.stagebar{display:flex;gap:0;margin:6px 0 4px;}
.stagebar .st{flex:1;text-align:center;position:relative;padding-top:26px;}
.stagebar .st .dot{position:absolute;top:0;left:50%;transform:translateX(-50%);width:18px;height:18px;border-radius:50%;background:var(--navy-card);border:2px solid var(--navy-line);z-index:2;}
.stagebar .st.done .dot{background:var(--green);border-color:var(--green);}
.stagebar .st.now .dot{background:var(--red);border-color:var(--red);box-shadow:0 0 0 4px var(--red-soft);}
.stagebar .st::before{content:'';position:absolute;top:8px;left:-50%;width:100%;height:2px;background:var(--navy-line);}
.stagebar .st:first-child::before{display:none;}
.stagebar .st.done::before,.stagebar .st.now::before{background:var(--green);}
.stagebar .st .nm{font-family:var(--disp);font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--grey);}
.stagebar .st.now .nm,.stagebar .st.done .nm{color:#fff;}

.check{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--navy-line);border-radius:var(--r-sm);margin-bottom:8px;cursor:pointer;transition:.14s;}
.check:hover{border-color:#33445f;}
.check .box{width:22px;height:22px;border-radius:6px;border:2px solid var(--navy-line);flex:none;display:flex;align-items:center;justify-content:center;transition:.14s;}
.check.on .box{background:var(--green);border-color:var(--green);}
.check.on .box svg{opacity:1;}
.check .box svg{width:13px;height:13px;stroke:#06140c;stroke-width:3.4;opacity:0;}
.check.on .lbl{color:var(--grey);text-decoration:line-through;}
.check .lbl{flex:1;font-size:13.5px;}

/* modal */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(4,7,14,.72);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;padding:20px;}
.overlay.on{display:flex;animation:fade .2s;}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
.sheet{width:100%;max-width:520px;max-height:90vh;overflow-y:auto;background:var(--navy-card);border:1px solid var(--navy-line);border-radius:var(--r);box-shadow:var(--shadow);animation:rise .28s both;}
.sheet-head{display:flex;align-items:center;gap:12px;padding:20px 22px;border-bottom:1px solid var(--navy-line);position:sticky;top:0;background:var(--navy-card);z-index:2;}
.sheet-head h3{font-family:var(--disp);font-weight:800;font-size:19px;text-transform:uppercase;letter-spacing:-.01em;}
.sheet-head .spacer{flex:1;}
.sheet-body{padding:22px;}
.sheet-foot{padding:16px 22px;border-top:1px solid var(--navy-line);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:var(--navy-card);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);z-index:300;background:var(--navy-card);border:1px solid var(--navy-line);border-left:3px solid var(--green);border-radius:var(--r-sm);padding:13px 18px;font-size:13.5px;box-shadow:var(--shadow);opacity:0;transition:.3s;pointer-events:none;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

<script>
/* ============================================================
   SHEVLIN OPERATING SYSTEM
   Single-file, deployable, role-based management system.
   ------------------------------------------------------------
   DATA LAYER
   This build runs in DATA_MODE = 'local'. All data lives in the
   STATE object below and is persisted to the browser. It works
   immediately, hosted or offline, with a real role-gated login.

   To go fully live as a multi-user system of record (shared data
   across the whole team + secure server-side auth), switch to
   DATA_MODE = 'supabase' and supply your project keys. Every read/
   write already routes through the small db() layer, so wiring
   Supabase is a contained change — not a rebuild. See db() below.
   ============================================================ */
const CONFIG = {
  DATA_MODE: 'local',            // demo fallback; live mode switches on automatically when the key below is set
  SUPABASE_URL: 'https://wuugikbtlmdyfgvuopic.supabase.co',
  SUPABASE_ANON_KEY: 'sb_publishable_po2MbZdw3YpW2Fhx9yhlkA_1bEmmFgm',   // legacy public anon key (starts eyJ...)
  COOKIE_DOMAIN: '.shevlincrm.co.uk',         // shared session across CRM + MOS subdomains
  STORE_KEY: 'shevlin_os_v2',
  OPERATION: 'Shevlin Coaching · Operation One'
};

/* ---------- ladder / roles ---------- */
const LADDER = {
  owner:  {label:'Owner',          level:5, sec:'Leadership'},
  bp:     {label:'Business Partner',level:4, sec:'Leadership'},
  tl:     {label:'Team Leader',    level:3, sec:'Leadership'},
  coach:  {label:'Sales Coach',    level:2, sec:'Field'},
  closer: {label:'Closer',         level:1, sec:'Field'},
  setter: {label:'Setter',         level:1, sec:'Field'}
};

/* ---------- targets from the documented OS ---------- */
const TARGETS = {
  setter: {profiles:200, firstMsgs:125, followUps:62, forms:18},      // weekly
  closer: {callsTaken:18, closes:5, revenue:24000, commission:5000},
  coach:  {repsOnTarget:5, reviews:10, oneToOnes:5}
};

/* ============================================================
   STATE  (seeded demo operation)
   ============================================================ */
let STATE = null;
const uid = (p='id')=>p+'_'+Math.random().toString(36).slice(2,9);
const WK = wkStart(new Date());

function wkStart(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x.toISOString().slice(0,10); }
function wkBack(n){ const x=new Date(WK); x.setDate(x.getDate()-7*n); return x.toISOString().slice(0,10); }
function fmtWk(iso){ const d=new Date(iso+'T00:00:00'); return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }
function money(n){ return '£'+Math.round(n).toLocaleString('en-GB'); }
function pct(n){ return Math.round(n)+'%'; }

function seed(){
  const M=[
    {id:'u_ayden', name:'Ayden Shevlin', email:'ayden@shevlin.os', pin:'1234', role:'owner',  pod:null,     mgr:null,       status:'active', start:'2023-01-10'},
    {id:'u_jordan',name:'Jordan Hayes',  email:'jordan@shevlin.os',pin:'1234', role:'bp',     pod:null,     mgr:'u_ayden',  status:'active', start:'2023-04-02'},
    {id:'u_priya', name:'Priya Anand',   email:'priya@shevlin.os', pin:'1234', role:'tl',     pod:null,     mgr:'u_jordan', status:'active', start:'2023-08-15'},
    {id:'u_marcus',name:'Marcus Bell',   email:'marcus@shevlin.os',pin:'1234', role:'coach',  pod:'Pod A',  mgr:'u_priya',  status:'active', start:'2024-01-09'},
    {id:'u_elena', name:'Elena Ortiz',   email:'elena@shevlin.os', pin:'1234', role:'coach',  pod:'Pod B',  mgr:'u_priya',  status:'amber',  start:'2024-02-20'},
    {id:'u_tom',   name:'Tom Frost',     email:'tom@shevlin.os',   pin:'1234', role:'closer', pod:'Pod A',  mgr:'u_marcus', status:'active', start:'2024-05-06'},
    {id:'u_aisha', name:'Aisha Khan',    email:'aisha@shevlin.os', pin:'1234', role:'closer', pod:'Pod B',  mgr:'u_elena',  status:'active', start:'2024-06-18'},
    {id:'u_liam',  name:'Liam Doyle',    email:'liam@shevlin.os',  pin:'1234', role:'setter', pod:'Pod A',  mgr:'u_marcus', status:'active', start:'2024-09-02'},
    {id:'u_sofia', name:'Sofia Marin',   email:'sofia@shevlin.os', pin:'1234', role:'setter', pod:'Pod A',  mgr:'u_marcus', status:'red',    start:'2025-02-11'},
    {id:'u_noah',  name:'Noah Wells',    email:'noah@shevlin.os',  pin:'1234', role:'setter', pod:'Pod B',  mgr:'u_elena',  status:'active', start:'2024-11-25'},
    {id:'u_mia',   name:'Mia Tran',      email:'mia@shevlin.os',   pin:'1234', role:'setter', pod:'Pod B',  mgr:'u_elena',  status:'training',start:'2025-04-14'}
  ];

  // weekly KPIs — 5 weeks back to now, with a believable trend per rep
  const kpis=[];
  const wks=[wkBack(4),wkBack(3),wkBack(2),wkBack(1),WK];
  function series(base,drift,jit){return wks.map((w,i)=>Math.max(0,Math.round(base+drift*i+(Math.random()*2-1)*jit)));}
  M.forEach(m=>{
    if(m.role==='setter'){
      const f=m.id==='u_sofia'?series(170,-22,8):series(180,8,12);
      const fm=m.id==='u_sofia'?series(95,-12,6):series(110,6,8);
      const fu=series(55,3,5); const forms=m.id==='u_sofia'?series(9,-1.3,1):(m.id==='u_mia'?series(8,2,1):series(15,1.2,2));
      wks.forEach((w,i)=>kpis.push({id:uid('k'),repId:m.id,week:w,role:'setter',profiles:f[i],firstMsgs:fm[i],followUps:fu[i],forms:forms[i]}));
    } else if(m.role==='closer'){
      const ct=series(17,1,2); const cl=series(4.6,.3,1); const rev=cl.map(c=>c*4800+Math.round((Math.random()*2-1)*1500));
      wks.forEach((w,i)=>kpis.push({id:uid('k'),repId:m.id,week:w,role:'closer',callsTaken:ct[i],closes:cl[i],revenue:Math.max(0,rev[i]),commission:cl[i]*1000}));

    }
  });

  // scorecards
  const MSG=['Personalisation','ICP accuracy','Honesty','Clarity','Brevity','Pressure-free'];
  const CALL=['Rapport & frame','Discovery depth','Qualification','Value framing','Objection honesty','Clear next step','Pressure-free close','Accuracy & honesty'];
  const sc=[];
  function card(repId,type,when,avg,jit,assessor){
    const crit=type==='message'?MSG:CALL; const scores={};
    crit.forEach(c=>scores[c]=Math.min(5,Math.max(1,Math.round(avg+(Math.random()*2-1)*jit))));
    const total=Object.values(scores).reduce((a,b)=>a+b,0); const max=crit.length*5; const p=Math.round(total/max*100);
    return {id:uid('sc'),repId,type,date:when,scores,total,max,pct:p,flag:p>=85?'green':p>=75?'amber':'red',assessor,note:''};

  sc.push(card('u_liam','message',wkBack(1),4.4,.6,'u_marcus'));
  sc.push(card('u_liam','message',WK,4.5,.5,'u_marcus'));
  sc.push(card('u_sofia','message',wkBack(1),3.1,.7,'u_marcus'));
  sc.push(card('u_sofia','message',WK,2.9,.8,'u_marcus'));
  sc.push(card('u_noah','message',WK,4.1,.6,'u_elena'));
  sc.push(card('u_mia','message',WK,3.7,.7,'u_elena'));
  sc.push(card('u_tom','call',wkBack(1),4.3,.6,'u_marcus'));
  sc.push(card('u_tom','call',WK,4.4,.5,'u_marcus'));
  sc.push(card('u_aisha','call',WK,4.0,.7,'u_elena'));

  // weekly reports (rhythm engine) — a couple already submitted
  const reports=[
    {id:uid('r'),authorId:'u_marcus',role:'coach',week:wkBack(1),submittedAt:wkBack(1),
      data:{flag:'Sofia red on message quality — volume paused, coaching booked.',risk:'Sofia',notes:'Liam strong, ready to mentor.'}},
    {id:uid('r'),authorId:'u_priya',role:'tl',week:wkBack(1),submittedAt:wkBack(1),
      data:{strong:'Tom Frost — 6 closes, clean call reviews.',behind:'Pod B setters under on forms — Elena addressing.',coachQuality:'Marcus on top of 1:1s; Elena slipping on reviews.',sysImprove:'Tighten the Tier 2 opener — response rate dipping.'}}
  ];

  // replacement protocol — one live
  const replacements=[{
    id:uid('rep'), candidateId:'u_liam', forRole:'coach', trainerId:'u_marcus',
    stage:2, week:3, status:'On track',
    log:[{week:1,covered:'Shadowed 1:1s, scorecard calibration'},{week:2,covered:'Led 2 rep reviews with feedback'},{week:3,covered:'Running daily check-ins for Pod A setters'}],
    proof:[], blockers:'None'
  }];

  // 1:1s
  const o2o=[
    {id:uid('o'),coachId:'u_marcus',repId:'u_liam',date:wkBack(1),worked:'Personalised openers landing well',improve:'Tighten the qualifying question',block:'None'},
    {id:uid('o'),coachId:'u_marcus',repId:'u_sofia',date:WK,worked:'Showed up consistent on volume',improve:'ICP accuracy — too many off-fit prospects',block:'Confidence after two slow weeks'}
  ];

  // onboarding
  const onboard=[{
    id:uid('ob'),memberId:'u_mia',role:'setter',
    items:[
      {label:'Signed Setter agreement',done:true},

      {label:'Passed fundamentals quiz (80%+)',done:true},
      {label:'CRM access + pipeline walkthrough',done:false},
      {label:'First 50 supervised messages reviewed',done:false},
      {label:'Daily KPI targets agreed with coach',done:false}
    ]
  }];

  STATE = {v:2, members:M, kpis, scorecards:sc, reports, replacements, oneToOnes:o2o, onboard, training:{}, session:null, view:'dashboard'};
  seedTraining();
}

/* ============================================================
   DATA LAYER  (swap point for Supabase)
   ============================================================ */
function persist(){ if(window.SB_ON)return; if(CONFIG.DATA_MODE!=='local')return; try{ localStorage.setItem(CONFIG.STORE_KEY, JSON.stringify(STATE)); }catch(e){/* in-memory only */} }
function load(){
  if(CONFIG.DATA_MODE==='local'){
    try{ const raw=localStorage.getItem(CONFIG.STORE_KEY); if(raw){ STATE=JSON.parse(raw); if(STATE && STATE.members){ if(!STATE.training)STATE.training={}; return; } } }catch(e){}
  }
  seed();
}
/* db() — the single seam. In 'supabase' mode this is where reads/writes
   would call the Supabase JS client against your tables + RLS policies. */
const db = {
  save(){ persist(); }
};

/* ============================================================
   HELPERS — people, scope, metrics
   ============================================================ */
const me      = ()=> STATE.members.find(m=>m.id===STATE.session);
const member  = id=> STATE.members.find(m=>m.id===id);
const initials= n=> n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();

function myReps(u){
  if(!u) return [];
  if(u.role==='owner'||u.role==='bp') return STATE.members.filter(m=>['setter','closer'].includes(m.role));
  if(u.role==='tl'){ const pods=STATE.members.filter(m=>m.role==='coach'&&m.mgr===u.id).map(c=>c.pod); return STATE.members.filter(m=>['setter','closer'].includes(m.role)&&pods.includes(m.pod)); }
  if(u.role==='coach') return STATE.members.filter(m=>['setter','closer'].includes(m.role)&&m.pod===u.pod);
  return [u]; // setter / closer see themselves
}
function myCoaches(u){
  if(u.role==='owner'||u.role==='bp') return STATE.members.filter(m=>m.role==='coach');
  if(u.role==='tl') return STATE.members.filter(m=>m.role==='coach'&&m.mgr===u.id);
  return [];
}
function visibleMembers(u){
  if(u.role==='owner'||u.role==='bp') return STATE.members;
  if(u.role==='tl'){ const ids=new Set([u.id]); myCoaches(u).forEach(c=>ids.add(c.id)); myReps(u).forEach(r=>ids.add(r.id)); return STATE.members.filter(m=>ids.has(m.id)); }
  if(u.role==='coach'){ const ids=new Set([u.id]); myReps(u).forEach(r=>ids.add(r.id)); return STATE.members.filter(m=>ids.has(m.id)); }
  return [u];
}
function kpiFor(repId,week){ return STATE.kpis.find(k=>k.repId===repId&&k.week===(week||WK)); }
function kpiSeries(repId,field){ return STATE.kpis.filter(k=>k.repId===repId).sort((a,b)=>a.week<b.week?-1:1).map(k=>k[field]||0); }

function repAttainment(m,week){
  const k=kpiFor(m.id,week); if(!k) return null;
  if(m.role==='setter'){ const t=TARGETS.setter; return Math.round(((k.forms/t.forms)*0.5 + (k.firstMsgs/t.firstMsgs)*0.3 + (k.profiles/t.profiles)*0.2)*100); }
  if(m.role==='closer'){ const t=TARGETS.closer; return Math.round(((k.closes/t.closes)*0.6 + (k.callsTaken/t.callsTaken)*0.4)*100); }
  if(m.role==='coach'){ const t=TARGETS.coach; return Math.round(((k.repsOnTarget/t.repsOnTarget)*0.5 + (k.oneToOnes/t.oneToOnes)*0.25 + (k.reviews/t.reviews)*0.25)*100); }
  return null;
}
function attFlag(a){ return a==null?'lvl':a>=90?'green':a>=70?'amber':'red'; }

function opTotals(week){
  const w=week||WK; const reps=STATE.members.filter(m=>['setter','closer'].includes(m.role));
  let forms=0,msgs=0,calls=0,closes=0,rev=0,comm=0;
  reps.forEach(m=>{ const k=kpiFor(m.id,w); if(!k)return;
    if(m.role==='setter'){ forms+=k.forms; msgs+=k.firstMsgs; }
    if(m.role==='closer'){ calls+=k.callsTaken; closes+=k.closes; rev+=k.revenue; comm+=k.commission; }
  });
  // setter commission (est on closes attributable) + TL overrides
  const setterComm = closes*1000;            // blended est
  const tlOverride = forms*30 + closes*50;
  const closeRate = calls? Math.round(closes/calls*100):0;
  return {forms,msgs,calls,closes,rev,closeRate,commLiab:comm+setterComm+tlOverride};
}
function teamHealth(){
  const reps=STATE.members.filter(m=>['setter','closer','coach'].includes(m.role));
  const scored=reps.map(m=>({m,a:repAttainment(m,WK)})).filter(x=>x.a!=null);
  const green=scored.filter(x=>x.a>=100).sort((a,b)=>b.a-a.a)[0];
  const red=scored.filter(x=>x.a<70).sort((a,b)=>a.a-b.a)[0];
  const amber=scored.filter(x=>x.a>=70&&x.a<100).sort((a,b)=>a.a-b.a)[0];
  return {green,amber,red};
}

function metric(label,value,sub,barClass,barPct,trend){
  return `<div class="metric">
    <div class="ml">${label}${trend!=null?`<span class="trend ${trend>=0?'up':'down'}">${trend>=0?'▲':'▼'} ${Math.abs(trend)}%</span>`:''}</div>

    ${sub?`<div class="mfoot">${sub}</div>`:''}
    ${barPct!=null?`<div class="bar ${barClass||''}"><i style="width:${Math.min(100,barPct)}%"></i></div>`:''}
  </div>`;
}
function trendOf(repId,field){ const s=kpiSeries(repId,field); if(s.length<2)return 0; const a=s[s.length-2],b=s[s.length-1]; return a?Math.round((b-a)/a*100):0; }

views.perf=function(){

    <div class="section-title" style="margin-top:24px">Closer pipeline</div>

function perfRepView(u){
  const fields = u.role==='setter'?[['forms','Forms'],['firstMsgs','First messages'],['profiles','Profiles'],['followUps','Follow-ups']]:[['closes','Closes'],['callsTaken','Calls taken'],['revenue','Revenue'],['commission','Commission']];
  return `<div class="grid g-2 stagger">${fields.map(f=>`<div class="panel"><div class="p-head"><h3>${f[1]} — 5 weeks</h3></div>${sparkPanel(u.id,f[0])}</div>`).join('')}</div>`;
}
function perfTable(reps,role){
  if(!reps.length) return '<div class="empty">None in scope.</div>';
  const cols = role==='setter'
    ? [['profiles','Profiles',TARGETS.setter.profiles],['firstMsgs','First msgs',TARGETS.setter.firstMsgs],['followUps','Follow-ups',TARGETS.setter.followUps],['forms','Forms',TARGETS.setter.forms]]
    : [['callsTaken','Calls',TARGETS.closer.callsTaken],['closes','Closes',TARGETS.closer.closes],['revenue','Revenue',TARGETS.closer.revenue]];
  return `<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Rep</th>${cols.map(c=>`<th class="rt">${c[1]}</th>`).join('')}<th class="rt">Trend</th><th class="rt">Attainment</th></tr></thead><tbody>${reps.map(m=>{
    const k=kpiFor(m.id); const a=repAttainment(m);
    const trendField=role==='setter'?'forms':'closes'; const tr=trendOf(m.id,trendField);
    return `<tr><td><div class="who-cell"><div class="av">${initials(m.name)}</div><div><b>${m.name}</b><small>${m.pod||''}</small></div></div></td>
      ${cols.map(c=>{const v=k?k[c[0]]:0; const ok=v>=c[2]; const disp=c[0]==='revenue'?money(v):v;
        return `<td class="rt num" style="color:${ok?'#7fe3b0':v>=c[2]*0.8?'#f2cf86':'#f3a3a3'}">${disp}<div class="muted" style="font-size:10px;font-weight:400">/${c[0]==='revenue'?money(c[2]):c[2]}</div></td>`;}).join('')}
      <td class="rt"><span class="trend ${tr>=0?'up':'down'}">${tr>=0?'▲':'▼'} ${Math.abs(tr)}%</span></td>
      <td class="rt"><span class="flag ${attFlag(a)}"><span class="dot"></span>${a!=null?pct(a):'—'}</span></td></tr>`;
  }).join('')}</tbody></table></div>`;
}

/* ---------- SCORECARDS ---------- */
views.score=function(){
  const u=me();
  const scope = ['setter','closer'].includes(u.role) ? [u] : myReps(u);
  const ids=new Set(scope.map(m=>m.id));
  const cards=STATE.scorecards.filter(s=>ids.has(s.repId)).sort((a,b)=>a.date<b.date?1:-1);
  const canScore=['owner','bp','tl','coach'].includes(u.role);
  // monthly summary per rep
  const summary=scope.map(m=>{const cs=STATE.scorecards.filter(s=>s.repId===m.id); if(!cs.length)return null; const avg=Math.round(cs.reduce((a,b)=>a+b.pct,0)/cs.length); return {m,avg,n:cs.length,flag:avg>=85?'green':avg>=75?'amber':'red'};}).filter(Boolean);
  return `
  ${canScore?`<div class="panel redtop" style="margin-bottom:18px">
    <div class="p-head"><h3>Score the standard</h3><span class="spacer"></span><button class="btn btn-red btn-sm" data-action="new-score">New scorecard</button></div>
    <p class="p-sub">Quality is not subjective. Six criteria for messages, eight for calls — scored 1–5. 85%+ on track · 75–84% amber · below 75% red, volume paused.</p>
    <div class="grid g-4 stagger">${summary.map(s=>`<div class="metric"><div class="ml">${s.m.name.split(' ')[0]}</div>
      <div class="mv tnum" style="font-size:30px;color:${s.flag==='green'?'#7fe3b0':s.flag==='amber'?'#f2cf86':'#f3a3a3'}">${s.avg}%</div>
      <div class="mfoot"><span class="flag ${s.flag}"><span class="dot"></span>${s.n} filed</span></div></div>`).join('')||'<div class="empty">No scorecards yet.</div>'}</div>
  </div>`:''}
  <div class="panel">
    <div class="p-head"><h3>Filed scorecards</h3></div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Rep</th><th>Type</th><th class="rt">Score</th><th class="rt">Result</th><th>Assessor</th><th class="rt">Date</th></tr></thead><tbody>${cards.map(s=>`<tr>
      <td><b>${member(s.repId).name}</b></td>
      <td>${s.type==='message'?'Message':'Call'}</td>

      <td class="rt"><span class="flag ${s.flag}"><span class="dot"></span>${s.pct}%</span></td>
      <td class="muted">${member(s.assessor)?member(s.assessor).name:'—'}</td>
      <td class="rt num">${fmtWk(s.date)}</td>

};

/* ---------- PROGRESSION / REPLACEMENT ---------- */
views.ladder=function(){

  // readiness: reps with 3 cards 85%+
  const ready=STATE.members.filter(m=>['setter','closer','coach'].includes(m.role)).map(m=>{
    const cs=STATE.scorecards.filter(s=>s.repId===m.id); const hi=cs.filter(c=>c.pct>=85).length;

  });
  return `

    <div class="panel">

      <p class="p-sub">Identify → Train → Prove → Sign off. Nobody advances until their seat is filled. The engine that makes the ladder self-sustaining.</p>

    <div class="panel redtop">
      <div class="p-head"><h3>Advancement readiness</h3></div>
      <p class="p-sub">Who is hitting the standard for the next rung.</p>
      ${ready.map(r=>`<div class="kv"><span class="k">${r.m.name}</span><span class="v"><span class="flag ${r.eligible?'green':'lvl'}"><span class="dot"></span>${r.eligible?'Eligible':r.hi+'/'+Math.max(2,r.n)}</span></span></div>`).join('')}

  </div>
  <div class="panel">
    <div class="p-head"><h3>The Ladder</h3></div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Level</th><th>Role</th><th>People here</th><th>Advancement rule</th></tr></thead><tbody>

    </tr>`;}).join('')}
    <tr><td class="num">L5</td><td><span class="flag lvl"><span class="dot"></span>Owner</span></td><td class="num">1</td><td class="muted" style="font-size:12.5px">Ayden — strategy, not operations</td></tr>

       <option value="coach">Sales Coach (L2)</option><option value="tl">Team Leader (L3)</option><option value="bp">Business Partner (L4)</option>
     </select></div>
     <div class="field"><label>Pod</label><select id="mPod"><option value="">— none —</option><option>Pod A</option><option>Pod B</option></select></div>`,
    `<button class="btn btn-ghost" data-action="close-modal">Cancel</button><button class="btn btn-red" data-action="save-member">Add to operation</button>`);
}
function modalScore(presetRep){
  const u=me(); const reps=myReps(u).filter(m=>['setter','closer'].includes(m.role));
  const MSG=['Personalisation','ICP accuracy','Honesty','Clarity','Brevity','Pressure-free'];
  const CALL=['Rapport & frame','Discovery depth','Qualification','Value framing','Objection honesty','Clear next step','Pressure-free close','Accuracy & honesty'];
  function seg(name){return `<div class="score-row"><div class="lbl">${name}</div><div class="seg" data-crit="${name}">${[1,2,3,4,5].map(n=>`<button data-action="seg" data-val="${n}">${n}</button>`).join('')}</div></div>`;}
  const initRep = presetRep || (reps[0]&&reps[0].id);
  const initRole = initRep ? member(initRep).role : 'setter';
  const crit = initRole==='closer'?CALL:MSG;
  openModal('New scorecard',
    `<div class="field"><label>Rep</label><select id="scRep">${reps.map(m=>`<option value="${m.id}" ${m.id===initRep?'selected':''}>${m.name} · ${LADDER[m.role].label}</option>`).join('')}</select></div>
     <div id="scCrit">${crit.map(seg).join('')}</div>
     <input type="hidden" id="scType" value="${initRole==='closer'?'call':'message'}">`,
    `<button class="btn btn-ghost" data-action="close-modal">Cancel</button><button class="btn btn-red" data-action="save-score">File scorecard</button>`);
}
function modalO2O(){
  const u=me(); const reps=myReps(u).filter(m=>['setter','closer'].includes(m.role));
  openModal('Log 1:1',
    `<div class="field"><label>Rep</label><select id="oRep">${reps.map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}</select></div>
     <div class="field"><label>One thing that worked</label><textarea id="oWorked"></textarea></div>
     <div class="field"><label>One thing to improve</label><textarea id="oImprove"></textarea></div>
     <div class="field"><label>One block</label><input id="oBlock" placeholder="None"></div>`,
    `<button class="btn btn-ghost" data-action="close-modal">Cancel</button><button class="btn btn-red" data-action="save-o2o">Save 1:1</button>`);
}
function modalReplacement(){
  const u=me();
  const cands=STATE.members.filter(m=>['setter','closer','coach'].includes(m.role));
  const trainers=STATE.members.filter(m=>['coach','tl','bp'].includes(m.role));
  openModal('Start replacement protocol',
    `<div class="field"><label>Candidate</label><select id="rCand">${cands.map(m=>`<option value="${m.id}">${m.name} · ${LADDER[m.role].label}</option>`).join('')}</select></div>
     <div class="field"><label>Training for role</label><select id="rRole"><option value="coach">Sales Coach</option><option value="tl">Team Leader</option><option value="closer">Closer</option></select></div>
     <div class="field"><label>Trainer</label><select id="rTrainer">${trainers.map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}</select></div>
     <p class="muted" style="font-size:12.5px">Minimum 4-week structured training, then 2 weeks independent proof, then three-party sign-off.</p>`,
    `<button class="btn btn-ghost" data-action="close-modal">Cancel</button><button class="btn btn-red" data-action="save-replacement">Begin · Stage 1</button>`);
}

/* ============================================================
   ACTIONS  (event delegation)
   ============================================================ */
let segState={};
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-action]'); if(!t) return;
  const a=t.dataset.action;
  if(a==='goto'){ setView(t.dataset.key); return; }
  if(a==='close-modal'){ closeModal(); return; }
  if(a==='new-member'){ modalNewMember(); return; }
  if(a==='new-score'){ segState={}; modalScore(); return; }
  if(a==='score-rep'||a==='score'){ segState={}; modalScore(t.dataset.id); return; }
  if(a==='new-o2o'){ modalO2O(); return; }
  if(a==='new-replacement'){ modalReplacement(); return; }
  if(a==='seg'){
    const wrap=t.closest('.seg'); wrap.querySelectorAll('button').forEach(b=>b.classList.remove('on')); t.classList.add('on');
    segState[wrap.dataset.crit]=+t.dataset.val; return;
  }
  if(a==='save-member'){ saveMember(); return; }
  if(a==='save-score'){ saveScore(); return; }
  if(a==='save-o2o'){ saveO2O(); return; }
  if(a==='save-replacement'){ saveReplacement(); return; }
  if(a==='submit-report'){ submitReport(t.dataset.role); return; }
  if(a==='advance-rep'){ advanceRep(t.dataset.id); return; }
  if(a==='toggle-onboard'){ toggleOnboard(t.dataset.id,+t.dataset.idx); return; }
});

function saveMember(){
  const name=val('mName'),email=val('mEmail'),role=val('mRole'),pod=val('mPod');
  if(!name||!email){ toast('Name and email required'); return; }
  const mgr = role==='setter'||role==='closer' ? (STATE.members.find(m=>m.role==='coach'&&m.pod===pod)||{}).id
            : role==='coach' ? (STATE.members.find(m=>m.role==='tl')||{}).id
            : role==='tl' ? (STATE.members.find(m=>m.role==='bp')||{}).id
            : (STATE.members.find(m=>m.role==='owner')||{}).id;
  STATE.members.push({id:uid('u'),name,email,pin:'1234',role,pod:pod||null,mgr:mgr||null,status:'training',start:new Date().toISOString().slice(0,10)});
  db.save(); closeModal(); toast(name+' added'); render();
}
function saveScore(){
  const repId=val('scRep'); const m=member(repId); const type=m.role==='closer'?'call':'message';
  const crit = type==='call'?['Rapport & frame','Discovery depth','Qualification','Value framing','Objection honesty','Clear next step','Pressure-free close','Accuracy & honesty']:['Personalisation','ICP accuracy','Honesty','Clarity','Brevity','Pressure-free'];
  const scores={}; let filled=0; crit.forEach(c=>{scores[c]=segState[c]||0; if(segState[c])filled++;});
  if(filled<crit.length){ toast('Score every criterion'); return; }
  const total=Object.values(scores).reduce((a,b)=>a+b,0); const max=crit.length*5; const p=Math.round(total/max*100);
  STATE.scorecards.push({id:uid('sc'),repId,type,date:WK,scores,total,max,pct:p,flag:p>=85?'green':p>=75?'amber':'red',assessor:STATE.session,note:''});
  // reflect red on member status
  if(p<75) m.status='red'; else if(p<85&&m.status==='red') m.status='amber'; else if(p>=85&&['amber','red'].includes(m.status)) m.status='active';
  sbPersist('scorecards',STATE.scorecards[STATE.scorecards.length-1]); sbPersistExt(m); db.save(); closeModal(); toast('Scorecard filed · '+p+'%'); render();
}
function saveO2O(){
  const repId=val('oRep'),worked=val('oWorked'),improve=val('oImprove'),block=val('oBlock');
  if(!worked){ toast('Add at least what worked'); return; }
  STATE.oneToOnes.push({id:uid('o'),coachId:STATE.session,repId,date:WK,worked,improve,block:block||'None'});
  // increment coach 1:1 count this week
  const k=kpiFor(STATE.session); if(k&&k.role==='coach') k.oneToOnes++;
  sbPersist('one_to_ones',STATE.oneToOnes[STATE.oneToOnes.length-1]); db.save(); closeModal(); toast('1:1 logged'); render();
}
function saveReplacement(){
  const candidateId=val('rCand'),forRole=val('rRole'),trainerId=val('rTrainer');
  STATE.replacements.push({id:uid('rep'),candidateId,forRole,trainerId,stage:1,week:0,status:'On track',log:[{week:0,covered:'Candidate identified'}],proof:[],blockers:'None'});
  const m=member(candidateId); if(m)m.status='training';
  sbPersist('replacements',STATE.replacements[STATE.replacements.length-1]); sbPersistExt(member(candidateId)); db.save(); closeModal(); toast('Protocol started'); render();
}
function submitReport(role){
  const f=document.getElementById('repForm'); if(!f)return;
  const data={}; f.querySelectorAll('[name]').forEach(i=>data[i.name]=i.value);
  const existing=STATE.reports.find(r=>r.authorId===STATE.session&&r.week===WK);
  if(existing){ existing.data=data; existing.submittedAt=new Date().toISOString().slice(0,10); }
  else STATE.reports.push({id:uid('r'),authorId:STATE.session,role,week:WK,submittedAt:new Date().toISOString().slice(0,10),data});
  const _rp=existing||STATE.reports[STATE.reports.length-1]; sbPersist('reports',_rp); db.save(); toast('Report submitted'); render();
}
function advanceRep(id){
  const r=STATE.replacements.find(x=>x.id===id); if(!r)return;
  r.stage=Math.min(4,r.stage+1); r.week+=2;
  if(r.stage===4){ r.status='Signed off'; const m=member(r.candidateId); if(m){ m.role=r.forRole; m.status='active'; } toast(member(r.candidateId).name+' signed off → '+LADDER[r.forRole].label); }
  else toast('Advanced to stage '+r.stage);
  sbPersist('replacements',r); const _am=member(r.candidateId); if(_am) sbPersistExt(_am);
  db.save(); render();
}
function toggleOnboard(id,idx){
  const o=STATE.onboard.find(x=>x.id===id); if(!o)return;
  o.items[idx].done=!o.items[idx].done;
  if(o.items.every(i=>i.done)){ const m=member(o.memberId); if(m&&m.status==='training')m.status='active'; }
  sbPersist('onboard',o); const _om=member(o.memberId); if(_om) sbPersistExt(_om);
  db.save(); render();
}
const val=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};

   Setter & Closer academies — lessons + certification exam.
   Completion certifies the rep and ticks their onboarding.
   ============================================================ */
let TQ=null, REVIEW=null, CERT=null;

function trainEnsure(mid){ if(!STATE.training) STATE.training={}; if(!STATE.training[mid]) STATE.training[mid]={}; return STATE.training[mid]; }
function trainRec(mid,unitId){ return ((STATE.training||{})[mid]||{})[unitId]; }
function academyForRole(role){ return role==='setter'?TRAINING.setter : role==='closer'?TRAINING.closer : null; }
function trainUnits(track){
  if(!track) return [];
  const u=track.modules.map(m=>({id:m.id,title:m.title,kind:'lesson',module:m}));
  if(track.quiz) u.push({id:track.id+'-exam',title:(track.exam&&track.exam.title)||'Certification Exam',kind:'exam',quiz:track.quiz,pass:(track.exam&&track.exam.pass)||80});
  return u;
}
function trainUnitDone(track,unit,mid){
  const p=trainRec(mid,unit.id);
  if(unit.kind==='lesson'){ const items=unit.module.objectives||[]; const cl=(p&&p.checklist)||{}; return items.length>0 && items.every((_,i)=>cl[i]); }
  return !!(p&&p.passed);
}
function trainPct(track,mid){ const u=trainUnits(track); if(!u.length)return 0; return Math.round(u.filter(x=>trainUnitDone(track,x,mid)).length/u.length*100); }
function trainCertified(track,mid){ const u=trainUnits(track); return u.length>0 && u.every(x=>trainUnitDone(track,x,mid)); }
function trainExamScore(track,mid){ const p=trainRec(mid,track.id+'-exam'); return p&&typeof p.score==='number'?p.score:null; }
function trainResumeUnit(track,mid){ for(const x of trainUnits(track)){ if(!trainUnitDone(track,x,mid)) return x; } return null; }
function fmtCertDate(mid,track){ const p=trainRec(mid,track.id+'-exam'); const d=new Date(p&&p.completedAt?p.completedAt:Date.now()); return d.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}); }

function trainBadge(m){
  const tr=academyForRole(m.role); if(!tr) return '<span class="muted">—</span>';
  if(trainCertified(tr,m.id)) return '<span class="flag green"><span class="dot"></span>Certified</span>';
  const pct=trainPct(tr,m.id); return `<span class="flag ${pct>0?'amber':'lvl'}"><span class="dot"></span>${pct>0?pct+'%':'Not started'}</span>`;
}

views.train=function(){
  const u=me();
  if(CERT) return certView();
  if(TQ && TQ.active) return trainQuizView();
  if(['setter','closer'].includes(u.role)) return academyView(academyForRole(u.role), u.id, false);
  if(REVIEW) return academyView(TRAINING[REVIEW], u.id, true);
  return trainManagerView(u);

function academyView(track, mid, reviewer){
  if(!track) return '<div class="empty">No academy for this role.</div>';
  const units=trainUnits(track), pct=trainPct(track,mid), done=trainCertified(track,mid), exScore=trainExamScore(track,mid);
  let html='';
  if(reviewer) html+=`<button class="btn btn-ghost btn-sm" data-action="train-team" style="margin-bottom:14px">← Team training</button>`;
  html+=`<div class="panel redtop" style="margin-bottom:18px">
    <div class="p-head"><h3>${track.name}</h3><span class="spacer"></span>${done?'<span class="flag green"><span class="dot"></span>Certified</span>':`<span class="flag ${pct>0?'amber':'lvl'}"><span class="dot"></span>${pct}%</span>`}</div>
    <p class="p-sub">${track.tagline}</p>
    <div class="bar ${done?'g':''}"><i style="width:${pct}%"></i></div>
    ${done?`<button class="btn btn-ghost btn-sm" data-action="train-cert" data-track="${track.id}" data-mid="${mid}" style="margin-top:14px">View certificate</button>`:''}
  </div>`;
  track.modules.forEach((m,li)=>{
    const items=m.objectives||[], cl=(trainRec(mid,m.id)||{}).checklist||{};
    const ldone=items.length>0 && items.every((_,i)=>cl[i]);
    html+=`<div class="panel" style="margin-bottom:12px">
      <div class="p-head"><span class="p-title">${li+1}. ${m.title}</span><span class="spacer"></span>${ldone?'<span class="flag green"><span class="dot"></span>Done</span>':'<span class="flag lvl"><span class="dot"></span>Lesson</span>'}</div>
      <p class="p-sub">${m.overview}</p>
      ${items.map((o,i)=>`<div class="check ${cl[i]?'on':''}" data-action="train-check" data-track="${track.id}" data-mid="${mid}" data-mod="${m.id}" data-i="${i}"><div class="box"><svg viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12"/></svg></div><div class="lbl">${o}</div></div>`).join('')}
    </div>`;
  });
  const ex=units.find(x=>x.kind==='exam');
  if(ex){
    const passed=trainUnitDone(track,ex,mid);
    const right = passed?`<span class="flag green"><span class="dot"></span>Passed · ${exScore}%</span>`
      : (exScore!=null?`<span class="flag amber"><span class="dot"></span>${exScore}% · retry</span>`:`<span class="flag lvl"><span class="dot"></span>${ex.quiz.length} questions</span>`);
    html+=`<div class="panel redtop">
      <div class="p-head"><span class="p-title">${ex.title}</span><span class="spacer"></span>${right}</div>
      <p class="p-sub">${ex.quiz.length} questions · ${ex.pass}% to pass. Work through the lessons first.</p>
      <button class="btn btn-red btn-sm" data-action="train-exam" data-track="${track.id}" data-mid="${mid}">${passed?'Retake exam':'Start exam'}</button>
    </div>`;
  }
  return html;
}

function trainManagerView(u){
  const reps=visibleMembers(u).filter(m=>['setter','closer'].includes(m.role));
  const rows=reps.map(m=>{
    const tr=academyForRole(m.role), pct=trainPct(tr,m.id), cert=trainCertified(tr,m.id), ex=trainExamScore(tr,m.id);
    const st=cert?'<span class="flag green"><span class="dot"></span>Certified</span>':(pct>0?'<span class="flag amber"><span class="dot"></span>In training</span>':'<span class="flag lvl"><span class="dot"></span>Not started</span>');
    return `<tr>

      <td class="rt num">${ex!=null?ex+'%':'—'}</td>
      <td class="rt">${st}</td></tr>`;
  }).join('');
  const certCount=reps.filter(m=>trainCertified(academyForRole(m.role),m.id)).length;
  return `<div class="grid g-3 stagger" style="margin-bottom:18px">

      <div class="p-head"><h3>Team training</h3><span class="spacer"></span>
        <button class="btn btn-ghost btn-sm" data-action="open-academy" data-track="setter">Setter Academy</button>

      <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Rep</th><th>Academy</th><th>Progress</th><th class="rt">Exam</th><th class="rt">Status</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="5"><div class="empty">No field reps in scope.</div></td></tr>'}</tbody></table></div>
    </div>`;
}

/* ---------- exam quiz ---------- */
function trainStartExam(mid,trackId){
  const track=TRAINING[trackId]; const ex=trainUnits(track).find(x=>x.kind==='exam'); if(!ex) return;
  TQ={active:true,trackId,mid,qs:ex.quiz,idx:0,answers:new Array(ex.quiz.length),correct:0,pass:ex.pass,title:ex.title,done:false};
  CERT=null; setView('train');
}
function trainAnswer(i){ if(!TQ||TQ.done) return; if(TQ.answers[TQ.idx]!=null) return; TQ.answers[TQ.idx]=i; if(i===TQ.qs[TQ.idx].a) TQ.correct++; setView('train'); }
function trainNext(){ if(!TQ) return; if(TQ.idx<TQ.qs.length-1) TQ.idx++; else trainFinalize(); setView('train'); }
function trainFinalize(){
  if(TQ.done) return; TQ.done=true;
  const score=Math.round(TQ.correct/TQ.qs.length*100), passed=score>=TQ.pass;
  const t=trainEnsure(TQ.mid), prev=t[TQ.trackId+'-exam']||{};
  t[TQ.trackId+'-exam']={passed:!!(prev.passed||passed),score:Math.max(prev.score||0,score),attempts:(prev.attempts||0)+1,completedAt:Date.now()};
  TQ.lastScore=score; TQ.lastPass=passed;
  if(passed){ const ob=STATE.onboard.find(o=>o.memberId===TQ.mid); if(ob){ ob.items.forEach(it=>{ if(/quiz|fundamental|exam/i.test(it.label)) it.done=true; }); if(ob.items.every(i=>i.done)){ const mm=member(ob.memberId); if(mm&&mm.status==='training') mm.status='active'; } sbPersist('onboard',ob); } const _tm=member(TQ.mid); if(_tm) sbPersistExt(_tm); }
  sbPersist('training',{member_id:TQ.mid,unit_id:TQ.trackId+'-exam',payload:t[TQ.trackId+'-exam']});
  db.save();
  const track=TRAINING[TQ.trackId];
  if(passed && trainCertified(track,TQ.mid)) setTimeout(()=>toast(member(TQ.mid).name.split(' ')[0]+' certified · '+track.name),250);
}
function trainQuizExit(){ TQ=null; setView('train'); }
function trainQuizView(){
  const track=TRAINING[TQ.trackId];
  if(!TQ.done){
    const item=TQ.qs[TQ.idx], sel=TQ.answers[TQ.idx], answered=sel!=null;
    const opts=item.o.map((o,i)=>{ let cls='opt', badge=String.fromCharCode(65+i);
      if(answered){ if(i===item.a){cls+=' correct';badge='✓';} else if(i===sel){cls+=' wrong';badge='✕';} } else if(i===sel) cls+=' sel';
      return `<button class="${cls}" ${answered?'disabled':''} data-action="tq-answer" data-i="${i}"><span class="ob">${badge}</span><span>${item.o[i]}</span></button>`;
    }).join('');
    const expl=answered?`<div class="explain show"><b>Why:</b> ${item.e}</div>`:'';
    const last=TQ.idx===TQ.qs.length-1;
    return `<div class="qwrap">
      <button class="btn btn-ghost btn-sm" data-action="tq-exit" style="margin-bottom:12px">← Exit exam</button>
      <div class="qprog"><div class="bar" style="flex:1"><i style="width:${Math.round(TQ.idx/TQ.qs.length*100)}%"></i></div><span class="qc">${TQ.idx+1} / ${TQ.qs.length}</span></div>
      <div class="qcard"><div class="qnum">${track.name} · Question ${TQ.idx+1}</div><div class="qtext">${item.q}</div>${opts}${expl}
        <div class="qfoot"><span class="qc tnum" style="color:var(--grey)">${TQ.correct} correct</span>${answered?`<button class="btn btn-red" data-action="tq-next">${last?'See result':'Next'} →</button>`:'<span class="muted" style="font-size:13px">Choose an answer to continue.</span>'}</div>
      </div></div>`;
  }
  const score=TQ.lastScore, passed=TQ.lastPass, certified=trainCertified(track,TQ.mid);
  return `<div class="qwrap"><div class="panel redtop result">
    <div class="score ${passed?'pass':'fail'} tnum">${score}%</div>
    <div class="verdict" style="color:${passed?'#7fe3b0':'#f3a3a3'}">${passed?'Passed':'Not yet'}</div>
    <p>${passed?`Above the ${TQ.pass}% pass mark${certified?' — academy complete.':'.'}`:`You need ${TQ.pass}% to pass. Review the lessons and try again — you've got this.`}</p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:22px">
      <button class="btn btn-ghost" data-action="train-exam" data-track="${TQ.trackId}" data-mid="${TQ.mid}">Retry</button>
      ${certified?`<button class="btn btn-red" data-action="train-cert" data-track="${TQ.trackId}" data-mid="${TQ.mid}">View certificate</button>`:'<button class="btn btn-red" data-action="tq-exit">Back to academy</button>'}
    </div></div></div>`;
}

/* ---------- lesson checklist toggle ---------- */
function trainToggle(mid,trackId,modId,i){
  const t=trainEnsure(mid), rec=t[modId]||(t[modId]={checklist:{}}); if(!rec.checklist) rec.checklist={};
  rec.checklist[i]=!rec.checklist[i];
  const track=TRAINING[trackId], unit=trainUnits(track).find(x=>x.id===modId);
  if(unit && trainUnitDone(track,unit,mid)) rec.completedAt=Date.now();
  sbPersist('training',{member_id:mid,unit_id:modId,payload:rec});
  db.save(); setView('train');
}

/* ---------- demo seed ---------- */
function seedTraining(){
  const setter=TRAINING.setter, closer=TRAINING.closer;
  const lesson=(mid,mod)=>{ const t=trainEnsure(mid); const cl={}; (mod.objectives||[]).forEach((_,i)=>cl[i]=true); t[mod.id]={checklist:cl,completedAt:Date.now()-86400000}; };
  const exam=(mid,track,score)=>{ const t=trainEnsure(mid); t[track.id+'-exam']={passed:true,score,attempts:1,completedAt:Date.now()-86400000}; };
  setter.modules.forEach(m=>lesson('u_liam',m)); exam('u_liam',setter,92);
  setter.modules.forEach(m=>lesson('u_sofia',m));
  closer.modules.forEach(m=>lesson('u_tom',m)); exam('u_tom',closer,88);
  closer.modules.slice(0,3).forEach(m=>lesson('u_aisha',m));
  setter.modules.slice(0,2).forEach(m=>lesson('u_noah',m));
  lesson('u_mia',setter.modules[0]);
}

/* ---------- training actions ---------- */
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-action]'); if(!t) return;
  const a=t.dataset.action, d=t.dataset;
  if(a==='train-check') trainToggle(d.mid,d.track,d.mod,+d.i);

});

/* ============================================================
   SUPABASE MODE — same login as the CRM.
   One Supabase project (the CRM's). Auth = team's existing
   email + password. Session lives in a cookie scoped to
   .shevlincrm.co.uk so it carries across CRM and MOS.
   ============================================================ */
let sb=null;

/* cookie storage adapter (chunked — Supabase sessions exceed one cookie) */
const cookieStorage={
  _domain(){ const h=location.hostname; return h.endsWith(CONFIG.COOKIE_DOMAIN.replace(/^\./,''))?'; Domain='+CONFIG.COOKIE_DOMAIN:''; },
  _attrs(){ return this._domain()+'; Path=/; Max-Age=31536000; SameSite=Lax'+(location.protocol==='https:'?'; Secure':''); },
  _get(n){ const m=document.cookie.match(new RegExp('(?:^|; )'+n.replace(/[.$?*|{}()[\]\\\/+^]/g,'\\$&')+'=([^;]*)')); return m?decodeURIComponent(m[1]):null; },
  getItem(key){
    const meta=this._get(key+'.n'); if(meta==null) return this._get(key);
    let out=''; for(let i=0;i<+meta;i++){ const c=this._get(key+'.'+i); if(c==null) return null; out+=c; } return out;
  },
  setItem(key,value){
    this.removeItem(key);
    const CH=3000, n=Math.ceil(value.length/CH);
    if(n<=1){ document.cookie=key+'='+encodeURIComponent(value)+this._attrs(); return; }
    for(let i=0;i<n;i++) document.cookie=key+'.'+i+'='+encodeURIComponent(value.slice(i*CH,(i+1)*CH))+this._attrs();
    document.cookie=key+'.n='+n+this._attrs();
  },
  removeItem(key){
    const kill=k=>{ document.cookie=k+'='+this._domain()+'; Path=/; Max-Age=0'; };
    const meta=this._get(key+'.n');
    if(meta!=null){ for(let i=0;i<+meta;i++) kill(key+'.'+i); kill(key+'.n'); }
    kill(key);
  }
};

/* role normalisation: CRM roles -> MOS ladder keys */
function normRole(r){
  r=String(r||'').toLowerCase().trim().replace(/[\s-]+/g,'_');
  if(r==='admin'||r==='owner') return 'owner';
  if(r==='bp'||r==='business_partner'||r==='partner') return 'bp';
  if(r==='tl'||r==='team_leader'||r==='team_lead'||r==='teamleader') return 'tl';
  if(r==='coach'||r==='sales_coach') return 'coach';
  if(r==='closer') return 'closer';
  if(r==='setter') return 'setter';
  return null;
}

/* ---------- load everything from the project ---------- */
async function sbLoadAll(uid){
  const get=async t=>{ const {data,error}=await sb.from(t).select('*'); if(error){ toast(t+': '+error.message); return []; } return data||[]; };
  const [profiles,ext,kpisLive,kpisManual,training,cards,reports,repl,o2o,onboard]=await Promise.all([
    get('profiles'),get('mos_profile_ext'),get('mos_kpis_live'),get('mos_kpis'),get('mos_training'),
    get('mos_scorecards'),get('mos_reports'),get('mos_replacements'),get('mos_one_to_ones'),get('mos_onboard')
  ]);
  // live CRM-derived weeks first; a manually-entered week for the same rep+week overrides (lets you correct)
  const kmap={};
  (kpisLive||[]).forEach(r=>{ kmap[r.rep_id+'|'+String(r.week).slice(0,10)]={rep_id:r.rep_id,week:r.week,role:r.role,metrics:r.metrics||{}}; });
  (kpisManual||[]).forEach(r=>{ const k=r.rep_id+'|'+String(r.week).slice(0,10); kmap[k]={rep_id:r.rep_id,week:r.week,role:r.role,metrics:Object.assign({},(kmap[k]||{}).metrics,r.metrics||{})}; });
  const kpis=Object.values(kmap);
  const extBy={}; ext.forEach(e=>extBy[e.user_id]=e);
  const members=profiles.map(p=>{
    const role=normRole(p.role); if(!role) return null;
    const e=extBy[p.id]||{};
    return { id:p.id, name:p.full_name||p.name||p.display_name||(p.email?p.email.split('@')[0]:'—'),
      email:p.email||'', pin:'', role, pod:e.pod||null, mgr:e.mgr||null,
      status:e.status||'active', start:e.start_date||(p.created_at?String(p.created_at).slice(0,10):'') };
  }).filter(Boolean);
  const T={}; training.forEach(r=>{ (T[r.member_id]=T[r.member_id]||{})[r.unit_id]=r.payload||{}; });
  STATE={ v:2, members,
    kpis:kpis.map(r=>Object.assign({id:'k_'+r.rep_id+'_'+r.week,repId:r.rep_id,week:String(r.week).slice(0,10),role:r.role},r.metrics||{})),
    scorecards:cards.map(r=>({id:r.id,repId:r.rep_id,type:r.type,date:String(r.date).slice(0,10),scores:r.scores||{},total:r.total,max:r.max,pct:r.pct,flag:r.flag,assessor:r.assessor,note:r.note||''})),
    reports:reports.map(r=>({id:r.id,authorId:r.author_id,role:r.role,week:String(r.week).slice(0,10),submittedAt:r.submitted_at?String(r.submitted_at).slice(0,10):'',data:r.data||{}})),
    replacements:repl.map(r=>({id:r.id,candidateId:r.candidate_id,forRole:r.for_role,trainerId:r.trainer_id,stage:r.stage,week:r.week,status:r.status,log:r.log||[],proof:r.proof||[],blockers:r.blockers||'None'})),
    oneToOnes:o2o.map(r=>({id:r.id,coachId:r.coach_id,repId:r.rep_id,date:String(r.date).slice(0,10),worked:r.worked,improve:r.improve,block:r.block||'None'})),
    onboard:onboard.map(r=>({id:r.id,memberId:r.member_id,role:r.role,items:r.items||[]})),
    training:T, session:uid, view:'dashboard' };
}

/* ---------- write-through ---------- */
function sbPersist(kind,obj){
  if(!window.SB_ON||!sb||!obj) return;
  const M={
    scorecards:['mos_scorecards',o=>({id:o.id,rep_id:o.repId,type:o.type,date:o.date,scores:o.scores,total:o.total,max:o.max,pct:o.pct,flag:o.flag,assessor:o.assessor,note:o.note||''}),'id'],
    one_to_ones:['mos_one_to_ones',o=>({id:o.id,coach_id:o.coachId,rep_id:o.repId,date:o.date,worked:o.worked,improve:o.improve,block:o.block}),'id'],
    reports:['mos_reports',o=>({id:o.id,author_id:o.authorId,role:o.role,week:o.week,submitted_at:o.submittedAt||null,data:o.data}),'id'],
    replacements:['mos_replacements',o=>({id:o.id,candidate_id:o.candidateId,for_role:o.forRole,trainer_id:o.trainerId,stage:o.stage,week:o.week,status:o.status,log:o.log,proof:o.proof,blockers:o.blockers}),'id'],
    onboard:['mos_onboard',o=>({id:o.id,member_id:o.memberId,role:o.role,items:o.items}),'id'],
    training:['mos_training',o=>o,'member_id,unit_id'],
    kpis:['mos_kpis',o=>{ const m=Object.assign({},o); delete m.id; delete m.repId; delete m.week; delete m.role;
      return {rep_id:o.repId,week:o.week,role:o.role,metrics:m}; },'rep_id,week']
  }[kind];
  if(!M) return;
  sb.from(M[0]).upsert(M[1](obj),{onConflict:M[2]}).then(r=>{ if(r&&r.error) toast('Sync failed — '+r.error.message); });
}
function sbPersistExt(m){
  if(!window.SB_ON||!sb||!m) return;
  sb.from('mos_profile_ext').upsert({user_id:m.id,pod:m.pod,mgr:m.mgr,status:m.status,start_date:m.start||null},{onConflict:'user_id'})
    .then(r=>{ if(r&&r.error) toast('Sync failed — '+r.error.message); });
}

/* ---------- supabase boot ---------- */
function sbLoginUI(){
  const foot=document.querySelector('.login-foot'); if(foot) foot.style.display='none';
  const pin=document.getElementById('liPin');
  if(pin){ pin.placeholder='Your CRM password'; pin.setAttribute('type','password'); const lab=pin.parentElement&&pin.parentElement.querySelector('label'); if(lab) lab.textContent='Password'; }

  const sub=document.querySelector('.login-top p'); if(sub) sub.textContent='Sign in with your Shevlin CRM account — one login across the system.';
}
function loadSbLib(){
  return new Promise(resolve=>{
    if(window.supabase) return resolve(true);
    let done=false; const finish=v=>{ if(!done){ done=true; resolve(v); } };
    // it may still be loading from the head tag — poll briefly first
    let waited=0; const poll=setInterval(()=>{ if(window.supabase){ clearInterval(poll); finish(true); } else if((waited+=150)>=3000){ clearInterval(poll); tryFallback(); } },150);
    function tryFallback(){
      const s=document.createElement('script');
      s.src='https://unpkg.com/@supabase/supabase-js@2';
      s.onload=()=>finish(!!window.supabase);
      s.onerror=()=>finish(false);
      document.head.appendChild(s);
      setTimeout(()=>finish(!!window.supabase),4000);
    }
  });
}
async function sbInit(){
  try{
    sbLoginUI();                                  // relabel first — never look like the demo in live mode
  }catch(e){}
  document.getElementById('login').style.display='flex';   // guarantee the login is visible no matter what
  let ok=false;
  try{ ok=await loadSbLib(); }catch(e){ ok=false; }
  const err=document.getElementById('liErr');
  if(!ok||!window.supabase){ if(err) err.textContent='Couldn\u2019t load the sign-in service. Check your connection and reload.'; return; }
  try{
    sb=window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY, {auth:{storage:cookieStorage,persistSession:true,autoRefreshToken:true,detectSessionInUrl:false}});
    const {data:{session}}=await sb.auth.getSession();
    if(session&&session.user){ await sbLoadAll(session.user.id); if(me()){ mountApp(); return; } }
    if(err) err.textContent='';
  }catch(e){ if(err) err.textContent='Sign-in service error — reload to try again.'; }
}
if(window.SB_ON){ if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',sbInit); else sbInit(); }
